name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build release binaries
        run: make release VERSION=${{ github.ref_name }}

      - name: Generate checksums
        run: |
          cd dist
          sha256sum sterm_* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  bump-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Homebrew formula
        run: |
          chmod +x scripts/update-homebrew-formula.sh
          ./scripts/update-homebrew-formula.sh "${{ github.ref_name }}" > sterm.rb

      - name: Push to homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::notice::HOMEBREW_TAP_TOKEN 未配置，跳过 homebrew-tap 更新"
            echo "请在仓库 Settings → Secrets 添加 HOMEBREW_TAP_TOKEN（需 repo 权限的 PAT）"
            exit 0
          fi
          git clone "https://x-access-token:${GH_TOKEN}@github.com/ha1377311454/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp sterm.rb tap/Formula/sterm.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/sterm.rb
          git diff --staged --quiet && echo "Formula 无变化，跳过提交" && exit 0
          git commit -m "chore: bump sterm to ${{ github.ref_name }}"
          git push origin HEAD
